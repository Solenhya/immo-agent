version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mon_postgres_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=mdp
      - POSTGRES_DB=ma_base_de_donnees
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: